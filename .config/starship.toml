add_newline = false

format = "$character$all"
right_format = "$git_branch$git_status$rust"

[line_break]
disabled = true

[character]
success_symbol = '[🦋](magenta)'
error_symbol = '[🦑](bold red)'

[golang]
disabled = false

[git_status]
disabled = false
style = "#ff00f8"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚔️"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "[?${count}](#5cecff)"
stashed = "[$${count}](#fbb725)"
modified = "[!${count}](#ff0099)"
staged = "[+${count}](#5cecff)"
renamed = "[»${count}](#aa00e8)"
deleted = "[✘${count}](#ff0099)"

[nodejs]
symbol = '☊ '

[rust]
format = '[$symbol]($style)'

[package]
disabled = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = "#5cecff bold"
symbol = " "

[battery]
disabled = true

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = "⏱️ [$duration]($style)"
style = "blink yellow"

# Removed: custom.git_diff_line_count (2 git commands per prompt, redundant with git_status !count)
# Removed: custom.tokei_rust (runs tokei on every prompt in Rust repos)

