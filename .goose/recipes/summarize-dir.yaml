version: "1.0.0"
title: "Summarize a directory"
description: "Read every text file under a directory and produce a structured summary written to reports/."
instructions: "You are summarizing a directory of documents. Be terse, factual, no business-speak. Group related files. Note any contradictions or stale items."
prompt: |
  Summarize {{ path }}.

  1. List every file under {{ path }} with one-line descriptions.
  2. Group files by topic.
  3. Identify contradictions, stale items, or gaps.
  4. Write the result to reports/REPORT_SUMMARY_{{ today }}.md.

  Be terse. No emojis, no superlatives, no business jargon.
parameters:
  - key: path
    input_type: string
    requirement: required
    description: "Directory to summarize"
  - key: today
    input_type: string
    requirement: required
    description: "Today's date YYYY-MM-DD (used in report filename)"
